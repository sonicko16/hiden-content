name: Update key version

on:
  schedule:
    - cron: '*/5 * * * *'  # cada 5 minutos

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update v value in JSON
        run: |
          # Leer el valor actual de v
          CURRENT_V=$(grep -o '"v=[0-9]*"' config.json | grep -o '[0-9]*')
          
          # Si no existe o está vacío, empezar en 3
          if [ -z "$CURRENT_V" ]; then
            CURRENT_V=3
          fi
          
          # Sumar 1
          NEW_V=$((CURRENT_V + 1))
          
          # Reemplazar en el archivo
          sed -i "s/&v=[0-9]*/\&v=$NEW_V/" config.json
          
          echo "Actualizado v=$CURRENT_V → v=$NEW_V"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git diff --cached --quiet || git commit -m "Update key v to $(($(grep -o 'v=[0-9]*' config.json | grep -o '[0-9]*')))"
          git push
